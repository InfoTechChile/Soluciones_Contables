    font-size: 1rem;

    outline: none;

    color: #ffffff;

}
.input-group input:focus {
    border-color: #00e5ff;
    box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
    background: rgba(255, 255, 255, 0.1);

.loader-bar {
    width: 250px;

    border-radius: 10px;
    overflow: hidden;
    margin-top: 20px;

.loader-progress {
    width: 0%;

</style>

</div>

<script>
/* LÓGICA DE LOGIN CON MÚLTIPLES USUARIOS */
function iniciarCarga() {
    const user = document.getElementById('userInput').value;
    const pass = document.getElementById('passInput').value;

    const usuarios = {
        "Invitado": "123",
        "1": "1",
        "2": "2"
    };

    if (usuarios[user] && usuarios[user] === pass) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('loadingScreen').style.display = 'flex';
        setTimeout(() => { document.getElementById('pBar').style.width = '100%'; }, 30);
        setTimeout(() => {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'flex';
        }, 3000);
    } else {
        document.getElementById('errorMsg').style.display = 'block';
    }
}
function handleLoginKey(e) { if (e.key === "Enter") iniciarCarga(); }

/* LÓGICA DE CALCULADORA (CON SOPORTE TECLADO) */
let calcExpression="";
function toggleCalc(){
  const modal = document.getElementById("calcModal");
  modal.style.display = (modal.style.display==="flex" || modal.style.display==="block") ? "none" : "flex";
}

function appendCalc(value){
  if(calcExpression==="0") calcExpression="";
  calcExpression += value;
  document.getElementById("calc-display").textContent = calcExpression;
}

function clearCalc(){
  calcExpression="";
  document.getElementById("calc-display").textContent="0";
  document.getElementById("calc-history").textContent="";
}

function calculate(){
  try{
    if(calcExpression === "") return;
    let result = eval(calcExpression);
    result = Math.round(result * 100) / 100;
    document.getElementById("calc-history").innerHTML += calcExpression + " = " + result + "<br>";
    const hist = document.getElementById("calc-history");
    hist.scrollTop = hist.scrollHeight;
    calcExpression = result.toString();
    document.getElementById("calc-display").textContent = calcExpression;
  } catch {
    document.getElementById("calc-display").textContent = "Error";
    calcExpression = "";
  }
}

// ESCUCHA DEL TECLADO PARA LA CALCULADORA
document.addEventListener('keydown', (e) => {
  const modal = document.getElementById("calcModal");
  if (modal.style.display === "flex") {
    const key = e.key;
    if (!isNaN(key)) appendCalc(key); // Si es número
    if (['+', '-', '*', '/','.'].includes(key)) appendCalc(key);
    if (key === "Enter") { e.preventDefault(); calculate(); }
    if (key === "Escape") toggleCalc();
    if (key === "Backspace" || key === "Delete") { e.preventDefault(); clearCalc(); }
  }
});

/* LÓGICA DE CALENDARIO */
let currentDate = new Date();
let calendarNotes = JSON.parse(localStorage.getItem("calendarNotes") || "{}");
const monthNames = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function renderCalendar(){
  const monthYear = document.getElementById('monthYear');
  const calendarGrid = document.getElementById('calendarGrid');
  calendarGrid.innerHTML = '';
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  monthYear.textContent = monthNames[month] + " " + year;
  const firstDay = new Date(year, month, 1).getDay();
  const totalDays = new Date(year, month + 1, 0).getDate();
  const weekdays = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  weekdays.forEach(d=>{
    const wd = document.createElement('div');
    wd.className = 'calendar-weekday'; wd.textContent = d;
    calendarGrid.appendChild(wd);
  });
  for(let i=0;i<firstDay;i++) calendarGrid.appendChild(document.createElement('div'));
  for(let d=1; d<=totalDays; d++){
    const cell = document.createElement('div');
    cell.className = 'calendar-date';
    const dayNum = document.createElement('div'); 
    dayNum.textContent = d;
    dayNum.style.fontWeight = 'bold';
    dayNum.style.color = '#fff';
    cell.appendChild(dayNum);
    const key = `${year}-${month+1}-${d}`;
    if(calendarNotes[key]){
      const noteDiv = document.createElement('div');
      noteDiv.className = 'note-text'; 
      noteDiv.textContent = calendarNotes[key];
      noteDiv.style.fontSize = '0.8rem';
      noteDiv.style.color = '#00e5ff';
      noteDiv.style.marginTop = '4px';
      cell.appendChild(noteDiv);
    }
    cell.onclick = ()=>{
      const nota = prompt('Nota para '+d+' de '+monthNames[month]+' de '+year, calendarNotes[key]||'');
      if(nota === null) return;
      if(nota.trim()==='') delete calendarNotes[key];
      else calendarNotes[key] = nota;
      localStorage.setItem('calendarNotes', JSON.stringify(calendarNotes));
      renderCalendar();
    };
    calendarGrid.appendChild(cell);
  }
}
function toggleCalendar(){
  const modal = document.getElementById('calendarModal');
  if(modal.style.display === 'flex') closeCalendar();
  else { modal.style.display = 'flex'; renderCalendar(); }
}
function closeCalendar(){ document.getElementById('calendarModal').style.display = 'none'; }
function nextMonth(){ currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); }
function prevMonth(){ currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); }

/* LÓGICA DE NOTAS */
let customNotes = JSON.parse(localStorage.getItem('customNotes') || "[]");
let selectedColor = '#bffffa'; // Cyan claro por defecto
function setNoteColor(color){ selectedColor = color; }
function toggleNotes(){
  const modal = document.getElementById('notesModal');
  if(modal.style.display === 'flex') closeNotes();
  else { modal.style.display = 'flex'; renderNotes(); }
}
function closeNotes(){ document.getElementById('notesModal').style.display = 'none'; }
function addNote(){
  const txt = document.getElementById('noteInput').value.trim();
  if(!txt) return;
  customNotes.push({ text: txt, color: selectedColor });
  localStorage.setItem('customNotes', JSON.stringify(customNotes));
  document.getElementById('noteInput').value = '';
  renderNotes();
}
function renderNotes(){
  const container = document.getElementById('notesContainer');
  container.innerHTML = '';
  customNotes.forEach((n, i)=>{
    const card = document.createElement('div');
    card.className = 'note-card'; card.style.background = n.color; card.textContent = n.text;
    card.onclick = ()=>{ if(confirm('¿Eliminar esta nota?')){ customNotes.splice(i,1); localStorage.setItem('customNotes', JSON.stringify(customNotes)); renderNotes(); } };
    container.appendChild(card);
  });
}

(function init(){
  // Colores pastel para las notas para que contrasten bien y se lean
  document.getElementById('c-cyan').style.background = "#bffffa";
  document.getElementById('c-pink').style.background = "#ffcce6";
  document.getElementById('c-green').style.background = "#ccffcc";
  document.getElementById('c-yellow').style.background = "#fffcb3";
  document.getElementById('c-purple').style.background = "#e6ccff";
  renderNotes();
})();

window.onclick = function(event) {
  const calc = document.getElementById('calcModal');
  const calen = document.getElementById('calendarModal');
  const notes = document.getElementById('notesModal');
  if (event.target == calc) calc.style.display = "none";
  if (event.target == calen) calen.style.display = "none";
  if (event.target == notes) notes.style.display = "none";
}
</script>
</body>
</html>
